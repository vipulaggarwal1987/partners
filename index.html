<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard - Fynd UK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fynd-black: #101319;
            --fynd-dark: #141414;
            --fynd-footer: #0E0E0E;
            --bg-light: #F8F8F9;
            --white: #FFFFFF;
            --text-dark: #101319;
            --text-light: #6B7280;
            --border-light: #E3E3E3;
            --red-urgent: #EF4444;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: var(--fynd-black);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--fynd-black);
        }

        .fynd-logo {
            margin-bottom: 8px;
        }

        .fynd-logo img {
            width: 140px;
            height: auto;
        }

        .logo-area {
            margin-bottom: 32px;
        }

        .logo-area h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--fynd-black);
            margin-bottom: 4px;
            margin-top: 16px;
        }

        .logo-area p {
            font-size: 13px;
            color: var(--text-light);
        }

        .logo-divider {
            width: 40px;
            height: 3px;
            background: var(--fynd-black);
            margin: 16px auto;
            border-radius: 2px;
        }

        .lock-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: var(--bg-light);
            color: var(--fynd-black);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--fynd-black);
            margin-bottom: 8px;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            padding: 12px 44px 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .password-wrapper input:focus {
            border-color: var(--fynd-black);
            box-shadow: 0 0 0 3px rgba(16, 19, 25, 0.08);
        }

        .password-wrapper input.error {
            border-color: var(--red-urgent);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-light);
            padding: 4px;
        }

        .toggle-password:hover {
            color: var(--text-dark);
        }

        .error-message {
            color: var(--red-urgent);
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: left;
        }

        .error-message.visible {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--fynd-dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 4px;
            font-family: inherit;
        }

        .login-btn:hover {
            background: var(--fynd-black);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 19, 25, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-light);
        }

        .footer-text a {
            color: var(--fynd-black);
            text-decoration: none;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 16px;
                padding: 32px 24px;
            }

            .logo-area h1 {
                font-size: 20px;
            }

            .fynd-logo img {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="fynd-logo">
                <img src="https://cdn.brandfetch.io/id7q4N5Xqp/w/5541/h/2250/theme/dark/logo.png?c=1dxbfHSJFAPEGdCLU4o5B" alt="Fynd Logo">
            </div>
            <h1>Partner Engagement Dashboard</h1>
            <p>Fynd UK Team</p>
            <div class="logo-divider"></div>
        </div>

        <div class="lock-badge">
            <span>&#128274;</span>
            <span>Restricted Access</span>
        </div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="off" autofocus>
                    <button type="button" class="toggle-password" onclick="togglePassword()">&#128065;</button>
                </div>
                <div class="error-message" id="errorMsg">Incorrect password. Please try again.</div>
            </div>
            <button type="submit" class="login-btn">Access Dashboard</button>
        </form>

        <p class="footer-text">Powered by <a href="https://www.fynd.com" target="_blank">Fynd</a></p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const input = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');

            if (input.value === 'Vipul@123!') {
                window.location.href = 'partner-dashboard.html';
            } else {
                input.classList.add('error');
                errorMsg.classList.add('visible');
                input.value = '';
                input.focus();

                setTimeout(() => {
                    input.classList.remove('error');
                }, 2000);
            }
            return false;
        }

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
            input.focus();
        }

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.remove('visible');
            this.classList.remove('error');
        });
    </script>
</body>
</html>
